name: Docstring Refactoring Bot

on:
  schedule:
    - cron: '0 0 * * *'
  workflow_dispatch:

permissions:
  contents: write
  pull-requests: write

jobs:
  refactor-docstrings:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Install Dependencies
        run: |
          pip install google-genai pyyaml

      - name: Run Docstring Agent
        id: agent
        env:
          DOCSTRING_BATCH_SIZE: "3"
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
        run: python scripts/docstring_agent.py

      - name: Create Pull Request
        if: steps.agent.outputs.refactored_count != '0'
        uses: peter-evans/create-pull-request@v6
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          commit-message: "docs: batch docstring updates (${{ steps.agent.outputs.refactored_count }} files)"
          title: "Docstring Bot: Update ${{ steps.agent.outputs.refactored_count }} docstring files"
          body: |
            This PR was automatically generated by the Docstring Refactoring Bot.

            **Files Updated (${{ steps.agent.outputs.refactored_count }})**
            ${{ steps.agent.outputs.refactored_files }}

            ## Changes
            - Rewrote docstrings to match `STYLE_GUIDE.md` (Google Style).
            - Ensured classes and methods follow the current Femora docstring standard.
            - Processed a batched slice of the queue and removed those files from `.github/docstring_targets.yml`.

            *Please review the changes for accuracy before merging.*
          branch: "docstring-bot/queue"
          labels: "documentation, automated"
