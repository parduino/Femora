name: Docstring Refactoring Bot (Copilot)

on:
  schedule:
    - cron: '0 12 * * *'
  workflow_dispatch:

permissions:
  contents: write
  pull-requests: write

jobs:
  refactor-docstrings:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Install Dependencies
        run: |
          pip install pyyaml
          npm install -g @github/copilot

      - name: Run Copilot Docstring Agent
        id: agent
        env:
          COPILOT_GITHUB_TOKEN: ${{ secrets.COPILOT_GITHUB_TOKEN }}
        run: python scripts/docstring_agent_copilot.py

      - name: Create Pull Request
        if: steps.agent.outputs.refactored_file != ''
        uses: peter-evans/create-pull-request@v6
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          commit-message: "docs: standardize docstrings via Copilot in ${{ steps.agent.outputs.refactored_file }}"
          title: "Docstring Bot (Copilot): Refactor ${{ steps.agent.outputs.refactored_file }}"
          body: |
            This PR was automatically generated by the Copilot Docstring Refactoring Bot.

            **Target File**: `${{ steps.agent.outputs.refactored_file }}`

            ## Changes
            - Rewrote docstrings to match `STYLE_GUIDE.md`.
            - Ensured classes and methods follow the current Femora docstring standard.
            - Removed the completed file from `.github/docstring_targets.yml`.

            Please review the generated docstrings for technical accuracy before merging.
          branch: "docstring-bot-copilot/${{ github.run_id }}"
          labels: "documentation, automated"
