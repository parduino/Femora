name: Docstring Refactoring Bot (Copilot)

on:
  schedule:
    - cron: '0 12 * * *'
  workflow_dispatch:

permissions:
  contents: write
  pull-requests: write

jobs:
  refactor-docstrings:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Install Dependencies
        run: |
          pip install pyyaml
          npm install -g @github/copilot

      - name: Run Copilot Docstring Agent
        id: agent
        env:
          COPILOT_GITHUB_TOKEN: ${{ secrets.COPILOT_GITHUB_TOKEN }}
          DOCSTRING_BATCH_SIZE: "3"
        run: python scripts/docstring_agent_copilot.py

      - name: Create Pull Request
        if: steps.agent.outputs.refactored_count != '0'
        uses: peter-evans/create-pull-request@v6
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          commit-message: "docs: batch docstring updates via Copilot (${{ steps.agent.outputs.refactored_count }} files)"
          title: "Docstring Bot (Copilot): Update ${{ steps.agent.outputs.refactored_count }} docstring files"
          body: |
            This PR was automatically generated by the Copilot Docstring Refactoring Bot.

            **Files Updated (${{ steps.agent.outputs.refactored_count }})**
            ${{ steps.agent.outputs.refactored_files }}

            ## Changes
            - Rewrote docstrings to match `.github/DOCSTRING_STYLE.md`.
            - Ensured classes and methods follow the current Femora docstring standard.
            - Processed a batched slice of the queue and removed those files from `.github/docstring_targets_copilot.yml`.

            Please review the generated docstrings for technical accuracy before merging.
          branch: "docstring-bot-copilot/queue"
          labels: "documentation, automated"
