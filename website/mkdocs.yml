site_name: Femora
site_url: https://femora.io/docs/
repo_url: https://github.com/GeotechUW/Femora
repo_name: GeotechUW/Femora

theme:
  name: material
  logo: assets/femora-logo.svg
  favicon: assets/femora-logo.svg
  icon:
    repo: fontawesome/brands/github
  features:
    - navigation.tabs
    - navigation.footer
    - content.code.copy
    - content.code.annotate
  palette:
    # System preference
    - media: "(prefers-color-scheme)"
      primary: custom
      toggle:
        icon: material/brightness-auto
        name: Switch to light mode

    # Light mode
    - media: "(prefers-color-scheme: light)"
      scheme: default
      primary: custom
      toggle:
        icon: material/toggle-switch
        name: Switch to dark mode

    # Dark mode
    - media: "(prefers-color-scheme: dark)"
      scheme: slate
      primary: custom
      toggle:
        icon: material/toggle-switch-off-outline
        name: Switch to system preference

# --- NEW: Math Support Configuration ---
markdown_extensions:
  - admonition
  - pymdownx.highlight:
      anchor_linenums: true
  - pymdownx.details
  - pymdownx.inlinehilite
  - pymdownx.snippets
  - pymdownx.tabbed:
      alternate_style: true
  - pymdownx.superfences:
      custom_fences:
        - name: mermaid
          class: mermaid
          format: !!python/name:pymdownx.superfences.fence_code_format
  - pymdownx.arithmatex:
      generic: true
  - attr_list
  - md_in_html
  - pymdownx.emoji:
      emoji_index: !!python/name:material.extensions.emoji.twemoji
      emoji_generator: !!python/name:material.extensions.emoji.to_svg

extra_javascript:
  - javascripts/mathjax.js
  - https://cdn.jsdelivr.net/npm/mathjax@3/es5/tex-mml-chtml.js

# --- END Math Config ---

extra_css:
  - stylesheets/extra.css

plugins:
  - search
  - autorefs
  - gen-files:
      scripts:
        - gen_ref_pages.py
  - literate-nav:
      nav_file: SUMMARY.md
  - section-index
  - mkdocstrings:
        default_handler: python
        handlers:
          python:
            paths: [../src]
            options:
              docstring_style: google
              docstring_section_style: table
              show_source: false
              show_category_heading: true
              separate_signature: true
              merge_init_into_class: true
              show_object_full_path: false
              members_order: source
              show_signature_annotations: true
              # This helps if the signature itself has the default values:
              show_root_full_path: false
              show_root_heading: true
              show_if_no_docstring: false 
              members: true
              filters: public

nav:
  - Home: index.md
  - Installation: installation.md
  - 'Getting Started': getting_started.md
  - Concepts:
      - Overview: concepts/index.md
      - Model: concepts/model.md
      - Managers: concepts/managers.md
      - 'Building Blocks': concepts/building-blocks.md
      - 'Mesh Parts': concepts/mesh-parts.md
      - Interfaces: concepts/interfaces.md
      - Assembly: concepts/assembly.md
      - 'Tags, Sources, Regions, and Groups': concepts/tags-sources-regions-and-groups.md
      - 'Loads, Time Series, and Patterns': concepts/loads-time-series-and-patterns.md
      - 'Damping, Recorders, and Outputs': concepts/damping-recorders-and-outputs.md
      - 'Process and Analysis': concepts/process-and-analysis.md
      - 'Partitioning and Parallel Execution': concepts/partitioning-and-parallel-execution.md
  - 'Tutorials and Examples': advanced.md
  - 'API Reference': reference/
