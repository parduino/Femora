site_name: Femora
site_url: https://femora.io/docs/
repo_url: https://github.com/amnp95/Femora
repo_name: amnp95/Femora

theme:
  name: material
  logo: assets/femora-logo.svg
  favicon: assets/femora-logo.svg
  icon:
    repo: fontawesome/brands/github
  features:
    - navigation.tabs
    - content.code.copy
    - content.code.annotate
  palette: 
    - scheme: default
      primary: custom
      toggle:
        icon: material/toggle-switch
        name: Switch to dark mode
    - scheme: slate
      primary: custom
      toggle:
        icon: material/toggle-switch-off-outline
        name: Switch to light mode

# --- NEW: Math Support Configuration ---
markdown_extensions:
  - admonition
  - pymdownx.highlight:
      anchor_linenums: true
  - pymdownx.details
  - pymdownx.inlinehilite
  - pymdownx.snippets
  - pymdownx.superfences
  - pymdownx.arithmatex:
      generic: true
  - attr_list
  - md_in_html
  - pymdownx.emoji:
      emoji_index: !!python/name:material.extensions.emoji.twemoji
      emoji_generator: !!python/name:material.extensions.emoji.to_svg

extra_javascript:
  - javascripts/mathjax.js
  - https://cdn.jsdelivr.net/npm/mathjax@3/es5/tex-mml-chtml.js

# --- END Math Config ---

extra_css:
  - stylesheets/extra.css

plugins:
  - search
  - autorefs
  - gen-files:
      scripts:
        - gen_ref_pages.py
  - literate-nav:
      nav_file: SUMMARY.md
  - section-index
  - mkdocstrings:
        default_handler: python
        handlers:
          python:
            paths: [../src]
            options:
              docstring_style: google
              docstring_section_style: table
              show_source: false
              show_category_heading: true
              separate_signature: true
              merge_init_into_class: true
              show_object_full_path: false
              members_order: source
              show_signature_annotations: true
              # This helps if the signature itself has the default values:
              show_root_full_path: false
              show_root_heading: true
              show_if_no_docstring: false 
              members: true
              filters: public

nav:
  - Website: https://femora.io/
  - Home: index.md
  - User Guide:
      - Installation: installation.md
      - 'Getting Started': getting_started.md
      - 'Advanced Meshing': advanced.md
  - API Reference: reference/  
